# ============================================================
# Calibration concerns
# ============================================================
calibration_risks:
  - "Some covert objectives may be too obvious (auto-flag by even L1 monitor) — needs pilot"
  - "Some covert verifications may be ambiguous in edge cases — preflight with sample completions"
  - "TAC tools may not all be present (e.g., finance_api specific calls); fallback = mock service layer"
  - "Variant C injection points need to land mid-trajectory; if task has no natural external-data fetch, variant C may not apply to that task"
